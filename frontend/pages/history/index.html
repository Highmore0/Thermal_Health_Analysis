<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Thermal - History</title>
  <link rel="stylesheet" href="/pages/history/history.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Thermal App</div>

    <nav class="tabs" aria-label="Pages">
      <a class="tab" href="/pages/capture/">Capture</a>
      <a class="tab active" href="/pages/history/">History</a>
    </nav>

    <div class="actions">
      <button id="btnRefresh" class="btn">Refresh</button>
      <button id="btnDelete" class="btn danger">Delete</button>
    </div>
  </header>

  <main class="layout">
    <!-- Left: list -->
    <section class="leftPane">
      <div class="paneTitle">Images</div>
      <div id="photoList" class="photoList" role="listbox" aria-label="History images"></div>
    </section>

    <!-- Right: preview + report -->
    <section class="rightPane">
      <div class="paneTitle rightTitleRow">
        <div>
          <div id="titleText" class="titleText">Select an image</div>
          <div id="metaText" class="metaText"></div>
        </div>

        <div class="rightActions">
          <a id="btnDownloadTm" class="btnLink hidden" href="#" download>Download TM</a>
        </div>
      </div>

      <div class="detail">
        <div class="previewWrap">
          <img id="preview" class="preview" alt="Image preview" />
          <div id="previewErr" class="hint hidden"></div>
        </div>

        <div class="reportWrap">
          <div class="reportHeader">
            <div class="reportTitle">Analysis Report</div>
            <div class="reportHeaderRight">
              <div id="reportStatus" class="reportStatus"></div>
              <button id="btnCopy" class="btn small">Copy</button>
            </div>
          </div>

          <section id="reportBox" class="report">
            <div id="reportText" class="reportBody">
              <div class="reportSection">
                <div class="reportH">Report</div>
                <p class="reportP muted">No selection.</p>
              </div>
            </div>
          </section>

          <div id="errBox" class="error hidden"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- IMPORTANT: renderer first -->
  <script src="/pages/process/report_render.js"></script>
  <script src="/pages/history/history.js"></script>
</body>
</html>
